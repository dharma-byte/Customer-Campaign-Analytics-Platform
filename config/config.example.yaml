# CCAP Configuration File — Copy this to config.yaml and fill in your values
# config.yaml is git-ignored; this example file is committed as a template.

database:
  host: localhost
  port: 5432
  dbname: ccap_db
  user: ccap_user
  password: YOUR_PASSWORD_HERE     # Replace with your PostgreSQL password
  schema: ccap
  pool_size: 5
  connect_timeout: 10

paths:
  raw_data: data/raw/
  processed_data: data/processed/
  logs: logs/
  models: ml_models/trained_models/
  artifacts: ml_models/artifacts/

logging:
  level: INFO                       # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: logs/ccap_pipeline.log
  max_bytes: 10485760               # 10 MB
  backup_count: 5

data_generation:
  n_customers: 10000
  n_campaigns: 20
  n_interactions: 150000
  date_range_start: "2023-01-01"
  date_range_end:   "2025-12-31"
  random_seed: 42

ml:
  model_name: xgboost_propensity_v1
  test_size: 0.2
  random_state: 42
  propensity_threshold: 0.65
  cv_folds: 5
  xgboost_params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 3           # Handles class imbalance
    eval_metric: auc
    use_label_encoder: false
